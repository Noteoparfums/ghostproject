<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Campaign threads woven into coordinated copy</title>
  <desc id="desc">Editorial copy planes flow through a woven center and emerge as a coordinated campaign.</desc>
  <rect width="960" height="720" rx="48" fill="#EFE7D8"/>
  <g opacity=".8" fill="#FFFDF8" stroke="#CFC2AC" stroke-width="2">
    <rect x="75" y="120" width="260" height="160" rx="18" transform="rotate(-8 75 120)"/>
    <rect x="630" y="92" width="250" height="175" rx="18" transform="rotate(7 630 92)"/>
    <rect x="645" y="455" width="230" height="150" rx="18" transform="rotate(-5 645 455)"/>
    <rect x="92" y="458" width="245" height="155" rx="18" transform="rotate(6 92 458)"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-width="30">
    <path d="M110 190c236 0 250 132 370 172s144 168 360 168" stroke="#BE5A3C"/>
    <path d="M840 170c-230 0-245 126-360 192S325 535 112 535" stroke="#263B33"/>
    <path d="M110 360h730" stroke="#D6A84B"/>
  </g>
  <circle cx="480" cy="360" r="98" fill="#F5F0E7" stroke="#18231F" stroke-width="5"/>
  <text x="480" y="350" text-anchor="middle" fill="#18231F" font-family="Georgia,serif" font-size="38" font-weight="700">Brief</text>
  <text x="480" y="390" text-anchor="middle" fill="#4E5B55" font-family="Arial,sans-serif" font-size="20">woven into campaign</text>
</svg>
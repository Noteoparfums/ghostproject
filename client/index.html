<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/briefloom-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Turn a focused campaign brief into coordinated direct-response copy with Briefloom."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Briefloom — Direct-response copy intelligence" />
    <meta
      property="og:description"
      content="Turn a focused campaign brief into coordinated direct-response copy with Briefloom."
    />
    <meta property="og:image" content="/brand/briefloom-social-preview.svg" />
    <script>
      (() => {
        let saved = 'system';
        try {
          saved = localStorage.getItem('ui_theme') || localStorage.getItem('briefloom_theme') || 'system';
        } catch {}
        const preference = ['system', 'light', 'dark'].includes(saved) ? saved : 'system';
        const resolved =
          preference === 'system'
            ? matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : preference;
        document.documentElement.classList.add(resolved);
        document.documentElement.dataset.theme = preference;
        document.documentElement.dataset.resolvedTheme = resolved;
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <title>Briefloom — Direct-response copy intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
